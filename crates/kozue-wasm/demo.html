<!--
  kozue WASM demo
  ===============
  To regenerate the WASM bindings next to this file, run these two commands
  from the workspace root:

    1. cargo build -p kozue-wasm --target wasm32-unknown-unknown --release

    2. wasm-bindgen target/wasm32-unknown-unknown/release/kozue_wasm.wasm \
         --out-dir crates/kozue-wasm/pkg --target web

  Then serve this directory over HTTP (ES modules and WASM require HTTP, not
  file://):

    python3 -m http.server 8080 --directory crates/kozue-wasm/

  and open http://localhost:8080/demo.html in your browser.
-->
<!doctype html>
<title>kozue WASM demo</title>
<meta charset="utf-8">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 1rem;
    background: #f5f5f5;
    color: #222;
  }
  h1 { margin-top: 0; font-size: 1.4rem; }
  .row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.5rem; }
  textarea {
    width: 100%;
    height: 220px;
    font-family: monospace;
    font-size: 0.9rem;
    padding: 0.5rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    resize: vertical;
  }
  select, button {
    padding: 0.35rem 0.7rem;
    font-size: 0.9rem;
    border: 1px solid #999;
    border-radius: 4px;
    cursor: pointer;
    background: #fff;
  }
  button { background: #0066cc; color: #fff; border-color: #0055aa; }
  button:hover { background: #0055aa; }
  #status {
    font-size: 0.85rem;
    min-height: 1.4em;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
  }
  #status.ok  { background: #d4edda; color: #155724; }
  #status.err { background: #f8d7da; color: #721c24; white-space: pre-wrap; font-family: monospace; }
  #output {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 1rem;
    min-height: 120px;
    overflow: auto;
  }
  #output img { max-width: 100%; }
  .col { flex: 1; min-width: 300px; }
</style>

<h1>kozue WASM demo</h1>

<div class="row">
  <div class="col">
    <div class="controls">
      <label for="lang">Language:</label>
      <select id="lang">
        <option value="kozue">kozue</option>
        <option value="mermaid">mermaid</option>
        <option value="plantuml">plantuml</option>
      </select>
      <button id="btn-svg">Render SVG</button>
      <button id="btn-png">Render PNG</button>
    </div>
    <textarea id="input" spellcheck="false">diagram flow {
  direction down
  a: "Start"
  b: "Process"
  c: "End"
  a -> b : "next"
  b -> c
}</textarea>
  </div>
  <div class="col">
    <div id="status"></div>
    <div id="output"></div>
  </div>
</div>

<script type="module">
import init, { render_svg, render_png, check } from './pkg/kozue_wasm.js';

await init();

const inputEl  = document.getElementById('input');
const langEl   = document.getElementById('lang');
const statusEl = document.getElementById('status');
const outputEl = document.getElementById('output');

// Update textarea placeholder text when language changes.
const EXAMPLES = {
  kozue: `diagram flow {
  direction down
  a: "Start"
  b: "Process"
  c: "End"
  a -> b : "next"
  b -> c
}`,
  mermaid: `sequenceDiagram
  participant A as Alice
  participant B as Bob
  A->>B: Hello
  B-->>A: Hi there`,
  plantuml: `@startuml
participant Alice
participant Bob
Alice -> Bob : Hello
Bob --> Alice : Hi there
@enduml`,
};

langEl.addEventListener('change', () => {
  inputEl.value = EXAMPLES[langEl.value] ?? '';
});

function setStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.className = isError ? 'err' : 'ok';
}

// Revoke any previous object URL to avoid memory leaks.
let prevObjectUrl = null;
function revokeOldUrl() {
  if (prevObjectUrl) {
    URL.revokeObjectURL(prevObjectUrl);
    prevObjectUrl = null;
  }
}

document.getElementById('btn-svg').addEventListener('click', () => {
  const input = inputEl.value;
  const lang  = langEl.value;
  try {
    const svg = render_svg(input, lang);
    revokeOldUrl();
    outputEl.innerHTML = svg;
    setStatus('SVG rendered successfully', false);
  } catch (e) {
    outputEl.innerHTML = '';
    setStatus(String(e), true);
  }
});

document.getElementById('btn-png').addEventListener('click', () => {
  const input = inputEl.value;
  const lang  = langEl.value;
  try {
    const bytes = render_png(input, lang);  // Uint8Array
    revokeOldUrl();
    const blob = new Blob([bytes], { type: 'image/png' });
    const url  = URL.createObjectURL(blob);
    prevObjectUrl = url;
    outputEl.innerHTML = '';
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'kozue PNG output';
    outputEl.appendChild(img);
    setStatus(`PNG rendered (${bytes.length} bytes)`, false);
  } catch (e) {
    outputEl.innerHTML = '';
    setStatus(String(e), true);
  }
});
</script>
