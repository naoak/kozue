<!--
  kozue WASM demo
  ===============
  To regenerate the WASM bindings next to this file, run these two commands
  from the workspace root:

    1. cargo build -p kozue-wasm --target wasm32-unknown-unknown --release

    2. wasm-bindgen target/wasm32-unknown-unknown/release/kozue_wasm.wasm \
         --out-dir crates/kozue-wasm/pkg --target web

  Then serve this directory over HTTP (ES modules and WASM require HTTP, not
  file://):

    python3 -m http.server 8080 --directory crates/kozue-wasm/

  and open http://localhost:8080/demo.html in your browser.
-->
<!doctype html>
<title>kozue WASM demo</title>
<meta charset="utf-8">
<meta name="color-scheme" content="light dark">
<style>
  :root {
    color-scheme: light dark;
    --bg: light-dark(#f5f5f5, #1a1a1a);
    --fg: light-dark(#222, #e8e8e8);
    --panel-bg: light-dark(#fff, #242424);
    --panel-border: light-dark(#ddd, #3a3a3a);
    --input-border: light-dark(#ccc, #4a4a4a);
    --control-border: light-dark(#999, #666);
    --control-bg: light-dark(#fff, #2e2e2e);
    --accent: light-dark(#0066cc, #4d9fff);
    --accent-hover: light-dark(#0055aa, #3d8fef);
    --accent-fg: light-dark(#fff, #0a0a0a);
    --ok-bg: light-dark(#d4edda, #16351f);
    --ok-fg: light-dark(#155724, #8fd8a4);
    --err-bg: light-dark(#f8d7da, #3a1a1d);
    --err-fg: light-dark(#721c24, #f3a7ad);
    --muted: light-dark(#666, #999);
  }
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 1rem;
    background: var(--bg);
    color: var(--fg);
  }
  .logo-row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 1.5rem; }
  /* Fade the logo's edges into the page background so it sits flush with it. */
  .logo-row img {
    width: 240px; height: auto; display: block;
    --fade: 4px;
    -webkit-mask-image:
      linear-gradient(to right,  transparent 0, #000 var(--fade), #000 calc(100% - var(--fade)), transparent 100%),
      linear-gradient(to bottom, transparent 0, #000 var(--fade), #000 calc(100% - var(--fade)), transparent 100%);
    -webkit-mask-composite: source-in;
    mask-image:
      linear-gradient(to right,  transparent 0, #000 var(--fade), #000 calc(100% - var(--fade)), transparent 100%),
      linear-gradient(to bottom, transparent 0, #000 var(--fade), #000 calc(100% - var(--fade)), transparent 100%);
    mask-composite: intersect;
  }
  .row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.5rem; }
  .controls label { font-size: 0.85rem; color: var(--muted); }
  /* Align the Sample and Language dropdowns' left edges by giving their
     labels a shared width. */
  label[for="sample"], label[for="lang"] { display: inline-block; min-width: 4.5rem; }
  textarea {
    width: 100%;
    height: 260px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.9rem;
    padding: 0.5rem;
    border: 1px solid var(--input-border);
    border-radius: 4px;
    resize: vertical;
    background: var(--control-bg);
    color: var(--fg);
  }
  select, button {
    padding: 0.35rem 0.7rem;
    font-size: 0.9rem;
    border: 1px solid var(--control-border);
    border-radius: 4px;
    cursor: pointer;
    background: var(--control-bg);
    color: var(--fg);
  }
  button.primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent-hover); }
  button.primary:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #status {
    font-size: 0.85rem;
    min-height: 1.4em;
    padding: 0.35rem 0.6rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    white-space: pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  #status.ok  { background: var(--ok-bg); color: var(--ok-fg); }
  #status.err { background: var(--err-bg); color: var(--err-fg); }
  #status:empty { padding: 0; }
  #output {
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 4px;
    padding: 1rem;
    min-height: 160px;
    overflow: auto;
  }
  #output img { max-width: 100%; }
  #output pre {
    margin: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.85rem;
    white-space: pre;
    overflow: auto;
    max-height: 60vh;
  }
  .col { flex: 1; min-width: 320px; }
  /* Both column headers share a height and bottom-align their contents, so the
     Render/Check and Download/Copy button rows line up horizontally and the
     textarea and output panels share a top edge. */
  .col-head { display: flex; flex-direction: column; justify-content: flex-end; min-height: 4.75rem; }
  .col-head > :last-child { margin-bottom: 0.5rem; }
  /* Split a control row into a left group and a right (button) group. */
  .controls.split { justify-content: space-between; flex-wrap: nowrap; }
  .group { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
</style>

<div class="logo-row">
  <img src="./kozue_logo.svg" alt="kozue logo" width="240">
</div>

<div class="row">
  <div class="col">
    <div class="col-head">
      <div class="controls">
        <label for="sample">Sample</label>
        <select id="sample"></select>
      </div>
      <div class="controls split">
        <div class="group">
          <label for="lang">Language</label>
          <select id="lang">
            <option value="kozue">kozue</option>
            <option value="mermaid">mermaid</option>
            <option value="plantuml">plantuml</option>
          </select>
        </div>
        <div class="group">
          <button id="btn-render" class="primary">Render</button>
          <button id="btn-check">Check</button>
        </div>
      </div>
    </div>
    <textarea id="input" spellcheck="false"></textarea>
  </div>
  <div class="col">
    <div class="col-head">
      <div id="status"></div>
      <div class="controls split">
        <div class="group">
          <label for="format">Format</label>
          <select id="format">
            <option value="svg">SVG</option>
            <option value="png">PNG</option>
            <option value="term">Term</option>
            <option value="dot">DOT</option>
            <option value="drawio">draw.io</option>
            <option value="excalidraw">Excalidraw</option>
            <option value="pptx">PowerPoint</option>
          </select>
        </div>
        <div class="group">
          <button id="btn-view-as" hidden>View As</button>
          <button id="btn-download">Download</button>
          <button id="btn-copy">Copy</button>
        </div>
      </div>
    </div>
    <div id="output"></div>
  </div>
</div>

<script type="module">
import init, {
  render_svg, render_png, render_term, render_dot, render_drawio, render_excalidraw, render_pptx, check,
} from './pkg/kozue_wasm.js';

// ---------------------------------------------------------------------------
// Samples — at least 2-3 per language, covering different diagram kinds.
// Every sample here has been verified to parse and render via the kozue CLI.
// ---------------------------------------------------------------------------

const SAMPLES = {
  kozue: {
    'flow: three-step process': `graph flow {
  direction down
  a: "Start"
  b: "Process"
  c: "End"
  a -> b : "next"
  b -> c
}`,
    'sequence: login flow': `sequence seq {
  participant web: "Web Browser"
  participant api: "API Server"
  participant db: "DB"
  web -> api : "POST /login"
  api -> db : "SELECT user"
  db --> api : "row"
  api --> web : "200 OK"
  api -> api : "make session"
}`,
    'state: traffic light': `state state_basic {
  state idle: "Idle"
  state active: "Active"
  state done: "Done"

  [*] -> idle
  idle -> active : "start"
  active -> active : "tick"
  active -> done : "finish"
  done -> [*]
}`,
    'class: shapes': `class shapes {
  class Shape {
    +area(): float
  }
  class Circle {
    +radius: float
    +area(): float
  }
  class Square {
    +side: float
  }
  Circle --|> Shape
  Square --|> Shape
}`,
    'er: shop': `er shop {
  entity Customer {
    id: Int PK
    name: String
    email: String UK
  }
  entity Order {
    id: Int PK
    customer_id: Int FK
    total: Money
  }
  Customer ||--o{ Order : "places"
}`,
  },
  mermaid: {
    'flow: three-step process': `flowchart TD
  start[Start] --> proc[Process]
  proc -->|OK| finish[Finish]
  proc -->|NG| err[Error]
  finish --> stop
  err --> stop[Stop]`,
    'sequence: greeting': `sequenceDiagram
  participant A as Alice
  participant B as Bob
  A->>B: Hello
  B-->>A: Hi there
  A->>A: Think`,
    'state: traffic light': `stateDiagram-v2
    state "Idle" as idle
    state "Active" as active
    state "Done" as done
    [*] --> idle
    idle --> active : start
    active --> active : tick
    active --> done : finish
    done --> [*]`,
    'class: shapes': `classDiagram
  class Shape {
    +area() float
  }
  class Circle {
    +float radius
    +area() float
  }
  class Square {
    +float side
  }
  Circle --|> Shape
  Square --|> Shape`,
    'er: shop': `erDiagram
  CUSTOMER {
    string name
    string email UK
  }
  ORDER {
    int id PK
    int customer_id FK
  }
  CUSTOMER ||--o{ ORDER : places`,
  },
  plantuml: {
    'sequence: greeting': `@startuml
participant Alice
participant Bob
Alice -> Bob : Hello
Bob --> Alice : Hi there
Alice -> Alice : Think
@enduml`,
    'sequence: login flow': `@startuml
participant Client as C
participant "API Server" as S
participant Database as DB

C -> S : POST /login
S --> C : 200 OK
S -> DB : SELECT user
DB --> S : row
C -> C : save session
@enduml`,
    'state: traffic light': `@startuml
state "Idle" as idle
state "Active" as active
state "Done" as done
[*] --> idle
idle --> active : start
active --> active : tick
active --> done : finish
done --> [*]
@enduml`,
    'class: shapes': `@startuml
abstract class Shape {
  +area() double
}
class Circle {
  +double radius
}
class Square {
  +double side
}
Circle --|> Shape
Square --|> Shape
@enduml`,
    'er: shop': `@startuml
entity Customer {
  * id : int
  name : string
}
entity Order {
  * id : int
  customer_id : int
}
Customer ||--o{ Order
@enduml`,
  },
};

const FORMAT_INFO = {
  svg:        { ext: 'svg',       mime: 'image/svg+xml',        kind: 'svg'  },
  png:        { ext: 'png',       mime: 'image/png',            kind: 'png'  },
  term:       { ext: 'txt',       mime: 'text/plain',           kind: 'text' },
  dot:        { ext: 'dot',       mime: 'text/vnd.graphviz',    kind: 'text' },
  drawio:     { ext: 'drawio',    mime: 'application/xml',      kind: 'text' },
  excalidraw: { ext: 'excalidraw',mime: 'application/json',     kind: 'text' },
  pptx:       { ext: 'pptx',      mime: 'application/vnd.openxmlformats-officedocument.presentationml.presentation', kind: 'binary' },
};

const inputEl    = document.getElementById('input');
const langEl     = document.getElementById('lang');
const formatEl   = document.getElementById('format');
const sampleEl   = document.getElementById('sample');
const statusEl   = document.getElementById('status');
const outputEl   = document.getElementById('output');
const renderBtn  = document.getElementById('btn-render');
const checkBtn   = document.getElementById('btn-check');
const downloadBtn = document.getElementById('btn-download');
const copyBtn    = document.getElementById('btn-copy');
const viewAsBtn  = document.getElementById('btn-view-as');

let wasmReady = false;

function populateSamples() {
  // Preserve the current selection across a language switch so that changing
  // Language keeps the same sample kind when the new language also has it.
  const prev = sampleEl.value;
  sampleEl.innerHTML = '';
  for (const name of Object.keys(SAMPLES[langEl.value])) {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sampleEl.appendChild(opt);
  }
  if (prev in SAMPLES[langEl.value]) sampleEl.value = prev;
}

function loadSample() {
  const samples = SAMPLES[langEl.value];
  const name = sampleEl.value in samples ? sampleEl.value : Object.keys(samples)[0];
  inputEl.value = samples[name];
}

populateSamples();
loadSample();

function setStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.className = isError ? 'err' : (msg ? 'ok' : '');
}

// Revoke any previous object URL to avoid memory leaks.
let prevObjectUrl = null;
function revokeOldUrl() {
  if (prevObjectUrl) {
    URL.revokeObjectURL(prevObjectUrl);
    prevObjectUrl = null;
  }
}

// Current rendered output, kept around for download/copy.
let current = null; // { kind: 'svg'|'png'|'text', text?: string, bytes?: Uint8Array, format }

// Formats that can be opened in an external editor via "View As".
const VIEW_AS = {
  drawio:     'draw.io',
  excalidraw: 'Excalidraw',
};

function updateActionButtons() {
  const hasOutput = current !== null;
  downloadBtn.disabled = !hasOutput;
  copyBtn.disabled = !hasOutput || current.kind === 'png';

  const site = hasOutput ? VIEW_AS[current.format] : undefined;
  viewAsBtn.hidden = !site;
  if (site) viewAsBtn.textContent = `View in ${site}`;
}

function doRender() {
  if (!wasmReady) return;
  const input = inputEl.value;
  const lang = langEl.value;
  const format = formatEl.value;

  try {
    revokeOldUrl();
    outputEl.innerHTML = '';
    current = null;

    switch (format) {
      case 'svg': {
        const svg = render_svg(input, lang);
        outputEl.innerHTML = svg;
        current = { kind: 'svg', text: svg, format };
        break;
      }
      case 'png': {
        const bytes = render_png(input, lang); // Uint8Array
        const blob = new Blob([bytes], { type: 'image/png' });
        const url = URL.createObjectURL(blob);
        prevObjectUrl = url;
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'kozue PNG output';
        outputEl.appendChild(img);
        current = { kind: 'png', bytes, format };
        break;
      }
      case 'term':
      case 'dot':
      case 'drawio':
      case 'excalidraw': {
        const fn = { term: render_term, dot: render_dot, drawio: render_drawio, excalidraw: render_excalidraw }[format];
        const text = fn(input, lang);
        const pre = document.createElement('pre');
        pre.textContent = text;
        outputEl.appendChild(pre);
        current = { kind: 'text', text, format };
        break;
      }
      case 'pptx': {
        const bytes = render_pptx(input, lang); // Uint8Array (binary, not previewable inline)
        const pre = document.createElement('pre');
        pre.textContent = `PowerPoint file rendered (${bytes.length} bytes). Click Download to save the .pptx.`;
        outputEl.appendChild(pre);
        current = { kind: 'binary', bytes, format };
        break;
      }
      default:
        throw new Error(`unknown format: ${format}`);
    }

    setStatus(`${format.toUpperCase()} rendered successfully`, false);
  } catch (e) {
    outputEl.innerHTML = '';
    current = null;
    setStatus(String(e), true);
  } finally {
    updateActionButtons();
  }
}

function doCheck() {
  if (!wasmReady) return;
  try {
    check(inputEl.value, langEl.value);
    setStatus('OK', false);
  } catch (e) {
    setStatus(String(e), true);
  }
}

// Debounced auto-render on input/lang/format changes.
let debounceTimer = null;
function scheduleRender() {
  if (debounceTimer !== null) clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doRender, 300);
}

inputEl.addEventListener('input', scheduleRender);
langEl.addEventListener('change', () => {
  populateSamples();
  loadSample();
  scheduleRender();
});
formatEl.addEventListener('change', scheduleRender);
sampleEl.addEventListener('change', () => {
  loadSample();
  scheduleRender();
});

renderBtn.addEventListener('click', doRender);
checkBtn.addEventListener('click', doCheck);

downloadBtn.addEventListener('click', () => {
  if (!current) return;
  const info = FORMAT_INFO[current.format];
  const blob = (current.kind === 'png' || current.kind === 'binary')
    ? new Blob([current.bytes], { type: info.mime })
    : new Blob([current.text], { type: info.mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kozue-diagram.${info.ext}`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  setStatus(`Downloaded kozue-diagram.${info.ext}`, false);
});

copyBtn.addEventListener('click', async () => {
  if (!current || current.kind === 'png' || current.kind === 'binary') return;
  try {
    await navigator.clipboard.writeText(current.text);
    setStatus('Copied output to clipboard', false);
  } catch (e) {
    setStatus(`Copy failed: ${e}`, true);
  }
});

// Compress a string with raw DEFLATE and base64-encode it, matching the
// encoding draw.io uses for its `#R` URL fragment (decode = atob -> inflateRaw
// -> decodeURIComponent, so we deflate the encodeURIComponent'd XML).
async function deflateRawBase64(str) {
  const cs = new CompressionStream('deflate-raw');
  const writer = cs.writable.getWriter();
  writer.write(new TextEncoder().encode(str));
  writer.close();
  const buf = new Uint8Array(await new Response(cs.readable).arrayBuffer());
  let bin = '';
  for (let i = 0; i < buf.length; i++) bin += String.fromCharCode(buf[i]);
  return btoa(bin);
}

// kozue emits a full <mxfile> with an uncompressed <mxGraphModel>; the draw.io
// `#R` fragment wants just the graph model.
function drawioGraphXml(mxfile) {
  const m = mxfile.match(/<mxGraphModel[\s\S]*<\/mxGraphModel>/);
  return m ? m[0] : mxfile;
}

viewAsBtn.addEventListener('click', async () => {
  if (!current || !VIEW_AS[current.format]) return;

  if (current.format === 'excalidraw') {
    // Excalidraw has no way to load client-generated data from a URL, so open
    // the editor and put the scene JSON on the clipboard for the user to paste.
    window.open('https://excalidraw.com/', '_blank', 'noopener');
    try {
      await navigator.clipboard.writeText(current.text);
      setStatus('Opened Excalidraw — paste (Ctrl/Cmd+V) on the canvas to load the copied scene', false);
    } catch (e) {
      setStatus(`Opened Excalidraw, but copying the scene failed: ${e}. Use Copy, then paste.`, true);
    }
    return;
  }

  // draw.io: embed the diagram in the URL fragment and open it directly.
  if (typeof CompressionStream === 'undefined') {
    window.open('https://app.diagrams.net/', '_blank', 'noopener');
    try { await navigator.clipboard.writeText(drawioGraphXml(current.text)); } catch {}
    setStatus('Opened draw.io — this browser lacks compression, so paste via Extras → Edit Diagram', false);
    return;
  }
  const tab = window.open('about:blank', '_blank'); // keep the handle to navigate it
  if (tab) tab.opener = null;
  try {
    const b64 = await deflateRawBase64(encodeURIComponent(drawioGraphXml(current.text)));
    const url = 'https://app.diagrams.net/?title=kozue-diagram.drawio#R' + encodeURIComponent(b64);
    if (tab) tab.location = url; else window.open(url, '_blank', 'noopener');
    setStatus('Opened in draw.io', false);
  } catch (e) {
    if (tab) tab.close();
    setStatus(`Failed to open in draw.io: ${e}`, true);
  }
});

updateActionButtons();

init().then(() => {
  wasmReady = true;
  doRender();
}).catch((e) => {
  setStatus(`Failed to initialize WASM module: ${e}`, true);
});
</script>
